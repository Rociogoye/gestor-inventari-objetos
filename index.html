<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestor d'inventari desenvolupat amb HTML, CSS i JavaScript">
    <title>Gestor d'Inventari</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <h1>📦 Gestor d'Inventari</h1>
        <p>Aplicació desenvolupada amb HTML, CSS i JavaScript</p>
    </header>

    <main class="contenidor">
        <section class="card" aria-labelledby="titol-nou-producte">
            <h2 id="titol-nou-producte">Nou producte</h2>

            <form id="formulariProducte" class="formulari">
                <div class="camp camp-nom">
                    <label for="inputNom">Nom</label>
                    <input type="text" id="inputNom" placeholder="Ex. Impressora" autocomplete="off" required>
                </div>

                <div class="camp">
                    <label for="inputStock">Stock</label>
                    <input type="number" id="inputStock" placeholder="0" min="0" step="1" required>
                </div>

                <div class="camp">
                    <label for="inputPreu">Preu (€)</label>
                    <input type="number" id="inputPreu" placeholder="0,00" min="0.01" step="0.01" required>
                </div>

                <button type="submit">➕ Afegir producte</button>
            </form>

            <p id="missatge" class="missatge" role="status" aria-live="polite"></p>
        </section>

        <section class="card" aria-labelledby="titol-inventari">
            <div class="capcalera">
                <h2 id="titol-inventari">Llista de productes</h2>
                <button type="button" id="btnStockBaix" class="btn-secundari">📌 Stock baix</button>
            </div>

            <div class="eines">
                <div class="camp cerca">
                    <label for="inputCerca">Buscar producte</label>
                    <input type="search" id="inputCerca" placeholder="Escriu un nom...">
                </div>

                <form id="formulariDescompte" class="descompte">
                    <div class="camp">
                        <label for="inputDescompte">Descompte (%)</label>
                        <input type="number" id="inputDescompte" placeholder="10" min="1" max="99" step="1">
                    </div>
                    <button type="submit">🏷️ Aplicar</button>
                    <button type="button" id="btnTreureDescompte" class="btn-neutre" hidden>Treure</button>
                </form>
            </div>

            <p id="resumFiltre" class="resum-filtre" aria-live="polite"></p>
            <ul id="llistaProductes" class="llista-productes">
                <!-- Els productes es generen des de JavaScript. -->
            </ul>
        </section>

        <section class="card" aria-labelledby="titol-estadistiques">
            <h2 id="titol-estadistiques">Estadístiques</h2>
            <div id="estadistiques" class="estadistiques">
                <p><span>Productes</span><strong>0</strong></p>
                <p><span>Unitats</span><strong>0</strong></p>
                <p><span>Valor total</span><strong>0,00 €</strong></p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Desenvolupament Front-end amb JavaScript</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
